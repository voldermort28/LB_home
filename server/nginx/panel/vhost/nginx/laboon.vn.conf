server
{
    listen 80;
	listen 443 ssl http2;
    server_name laboon.vn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/laboon.vn;
    include /www/server/panel/vhost/nginx/extension/laboon.vn/*.conf;

    #CERT-APPLY-CHECK--START
    # Configuration related to file verification for SSL certificate application - Do not delete
    include /www/server/panel/vhost/nginx/well-known/laboon.vn.conf;
    #CERT-APPLY-CHECK--END
    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/laboon.vn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/laboon.vn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    #SSL-END

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP reference configuration, allowed to be commented, deleted or modified
    include enable-php-74-wpfastcgi.conf;
    #PHP-INFO-END

    location = /index.php
    {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-74.sock;
        fastcgi_index index.php;
        include fastcgi.conf;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache WORDPRESS;
        fastcgi_cache_valid 200 301 302 1d;
        add_header X-Cache "$upstream_cache_status From $host" always;
        add_header Nginx-Cache "$upstream_cache_status" always;
        add_header Cache-Control max-age=0 always;
    }

    #REWRITE-START URL rewrite rule reference, any modification will invalidate the rewrite rules set by the panel
    include /www/server/panel/vhost/rewrite/laboon.vn.conf;
    #REWRITE-END

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    # Directory verification related settings for one-click application for SSL certificate
    location ~ \.well-known{
        allow all;
    }

    location ~* \.(gif|jpg|jpeg|png|webp|avif|svg|ico|bmp|swf)$
    {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        error_log /dev/null;
        access_log off;
    }

    location ~* \.(js|css)$
    {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        error_log /dev/null;
        access_log off; 
    }

    location ~* \.(woff|woff2|ttf|otf|eot)$
    {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Access-Control-Allow-Origin "*";
        error_log /dev/null;
        access_log off;
    }
    access_log  /www/wwwlogs/laboon.vn.log;
    error_log  /www/wwwlogs/laboon.vn.error.log;
}
